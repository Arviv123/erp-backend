services:
  # ─── Frontend (React SPA) ─────────────────────────────
  - type: static
    name: erp-frontend
    rootDir: clients/00-portal
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ─── Landing page ─────────────────────────────────────
  - type: static
    name: erp-landing
    rootDir: clients/landing
    staticPublishPath: .
    pullRequestPreviewsEnabled: false

  # ─── Backend (Node.js API) ────────────────────────────
  - type: web
    name: erp-backend
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm run db:generate && npm run build
    startCommand: node dist/app.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: ALLOWED_ORIGINS
        sync: false
